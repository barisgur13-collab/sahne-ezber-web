name: Web Sitesini Yayinla (GitHub Pages)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # GitHub'a da versiyon çakışmalarını atlamasını söylüyoruz
      - run: npm install --legacy-peer-deps
      - run: npm install lucide-react --legacy-peer-deps
      
      - run: npm run build
        env:
          CI: false
          
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
      - uses: actions/deploy-pages@v4